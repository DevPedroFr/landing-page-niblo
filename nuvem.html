<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #050505;
            --circuit-glow: #00f2ff;
            --cloud-orange: #ff8c00;
            --cloud-blue: #1a2a6c;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The main cloud container */
        .cloud-container {
            position: relative;
            width: 500px;
            height: 300px;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.2));
        }

        /* Base cloud shape using pseudo-elements for the humps */
        .cloud-shape {
            position: absolute;
            width: 300px;
            height: 100px;
            background: linear-gradient(to bottom, var(--cloud-orange), var(--cloud-blue));
            bottom: 50px;
            left: 100px;
            border-radius: 50px;
        }

        .cloud-shape::after, .cloud-shape::before {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cloud-shape::after {
            width: 150px;
            height: 150px;
            top: -70px;
            left: 30px;
        }

        .cloud-shape::before {
            width: 180px;
            height: 180px;
            top: -100px;
            right: 20px;
        }

        /* Overlaying the circuit pattern */
        .circuit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            mask-image: radial-gradient(circle, black 70%, transparent 100%);
            pointer-events: none;
        }

        /* Animated "Pulse" lines representing data flow */
        .pulse-line {
            position: absolute;
            background: var(--circuit-glow);
            box-shadow: 0 0 8px var(--circuit-glow);
            opacity: 0;
            animation: flow 3s infinite linear;
        }

        @keyframes flow {
            0% { transform: scaleX(0); opacity: 0; transform-origin: left; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: scaleX(1); opacity: 0; transform-origin: right; }
        }

        /* Puzzle Piece Lines (CSS borders to mimic the gaps) */
        .puzzle-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0,0,0,0.3);
            box-sizing: border-box;
            z-index: 2;
            /* Using a clip-path would be more precise for "interlocking" 
               but a simple grid overlay gives the segmented "modular" feel */
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 15px, rgba(0,0,0,0.2) 16px);
            background-size: 100px 100px;
        }

    </style>
</head>
<body>

    <div class="cloud-container">
        <div class="cloud-shape">
            <div class="puzzle-grid"></div>
            <div class="circuit-overlay"></div>
            
            <div class="pulse-line" style="width: 60px; height: 2px; top: 20%; left: 10%; animation-delay: 0s;"></div>
            <div class="pulse-line" style="width: 80px; height: 2px; top: 50%; left: 40%; animation-delay: 1s;"></div>
            <div class="pulse-line" style="width: 40px; height: 2px; top: 80%; left: 20%; animation-delay: 0.5s;"></div>
            <div class="pulse-line" style="width: 100px; height: 2px; top: 30%; right: 10%; animation-delay: 1.5s;"></div>
        </div>
    </div>

</body>
</html>
