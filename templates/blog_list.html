{% extends 'site_base.html' %}

{% block title %}Blog — Niblo Cloud{% endblock %}

{% block content %}
<section id="blog" class="section-hero">
  <div class="reveal">
    <span class="section-tag" data-content-key="hero_tag">Blog</span>
    <h2 class="section-title" data-content-key="hero_title">Esteja por dentro das últimas notícias</h2>
  </div>
  <div class="blog-grid">
    {% for post in posts %}
    <a href="{{ url_for('blog_post', slug=post.slug) }}" class="blog-card reveal">
      <div class="blog-img blog-card-media" style="background-image: url('{{ url_for('static', filename=post.cover_image) }}');"></div>
      <div class="blog-footer"><span>Clique e saiba mais</span><span class="arrow-icon">→</span></div>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
